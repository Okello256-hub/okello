<!DOCTYPE html>
<html>
<head>
  <title>My Profile Card</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body {
  font-family: Arial, sans-serif;
}

.card {
  width: 300px;
  margin: 50px auto;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
  text-align: center;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.card img {
  width: 200px;
  height: 200px;
  border-radius: 70%;
  margin-bottom: 10px;
}

.card button {
  background-color: #4CAF50;
  color: #fff;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.card button:hover {
  background-color: #3e8e41;
}
</style>

</head>

<body>
  <div class="card">
    <h2>Okello Brian</h2>
    <img src="bbc_jpg.jpg">
    <p>Hi, I'm Okello Brian, a software developer with a passion for coding and learning new technologies.</p>
    <button>Follow Me</button>
  </div>
</body>
</html>
